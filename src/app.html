<!doctype html>
<html lang="pt-BR">

<head>
	<meta charset="utf-8" />

	<!-- --------------FAVICON--------------- -->
	<link rel="icon" type="image/png" href="/icons/favicon-96x96.png" sizes="96x96" />
	<link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
	<link rel="shortcut icon" href="/icons/favicon.ico" />
	<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
	<link rel="manifest" href="/icons/site.webmanifest" />

	<!-- --------------FONTE--------------- -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
		rel="stylesheet">


	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Rosæs</title>
	<meta name="description" content="Este é um portfólio criado com o objetivo de centralizar e apresentar meus projetos, formações e experiências. Aqui você encontrará uma vitrine do meu desenvolvimento acadêmico e profissional, com destaque para trabalhos realizados e competências adquiridas.
	O site funciona como um espaço para compartilhar meu crescimento como estudante e profissional de tecnologia, documentando minha jornada, aprendizados e contribuições." />
	
	<style>
		html {
			width: 100%;
			height: auto;
			min-height: 100%;
			font-family: "Manrope", sans-serif;
			overflow-x: hidden;
			overflow-y: auto;
			box-sizing: border-box;
			background-color: #f3f6e8;
			transition: background-color 0.35s ease, color 0.35s ease;
		}

		:root {
			--primary-color: #2a1f15;
			--secondary-color: #fffce2;
			--dark-theme: #15100b;
			--surface-color: rgba(255, 252, 226, 0.72);
			--surface-stroke: rgba(42, 31, 21, 0.18);
			--accent-color: #c8a246;
			--shadow-color: rgba(42, 31, 21, 0.2);
			--text-soft: rgba(42, 31, 21, 0.75);
		}

		body.dark-mode {
			--primary-color: #fff3d1;
			--secondary-color: #1d150f;
			--surface-color: rgba(31, 23, 16, 0.82);
			--surface-stroke: rgba(255, 243, 209, 0.18);
			--accent-color: #d2af55;
			--shadow-color: rgba(0, 0, 0, 0.36);
			--text-soft: rgba(255, 243, 209, 0.82);
			background-color: var(--dark-theme) !important;
		}

		body.dark-mode html {
			background-color: var(--dark-theme);
		}

		body.dark-mode nav button.active
		{
			background-color: rgba(34, 25, 18, 0.95) !important;
			color: var(--primary-color) !important;
		}

		body.dark-mode .contatos-container h2,
		body.dark-mode .contatos-container h3,
		body.dark-mode .contatos-container p,
		body.dark-mode .contatos-container a,
		body.dark-mode .curriculo-container h2,
		body.dark-mode .curriculo-container h3,
		body.dark-mode .curriculo-container p,
		body.dark-mode .nota,
		body.dark-mode main {
			background-color: initial;
			color: var(--primary-color) !important;
		}

		body.dark-mode .contatos-container p,
		body.dark-mode .curriculo-container .nota {
			color: var(--text-soft) !important;
		}

		button {
			font-family: "Space Grotesk", sans-serif;
		}

		body {
			margin: 0;
			padding: 0;
			line-height: 1.6;
			background:
				radial-gradient(circle at 5% 5%, rgba(200, 162, 70, 0.22), transparent 35%),
				radial-gradient(circle at 92% 18%, rgba(81, 58, 35, 0.16), transparent 36%),
				linear-gradient(145deg, #fffce2 0%, #f5efd1 100%);
			color: var(--primary-color);
			overflow-x: hidden;
			overflow-y: auto;
			height: auto;
			min-height: 100dvh;
			box-sizing: border-box;
			position: relative;
		}

		body::before {
			content: "";
			position: fixed;
			inset: 0;
			pointer-events: none;
			background-image: linear-gradient(rgba(42, 31, 21, 0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(42, 31, 21, 0.035) 1px, transparent 1px);
			background-size: 24px 24px;
			opacity: 0.55;
			z-index: -1;
		}

		body.dark-mode {
			background:
				radial-gradient(circle at 5% 5%, rgba(210, 175, 85, 0.2), transparent 35%),
				radial-gradient(circle at 92% 18%, rgba(74, 53, 34, 0.22), transparent 36%),
				linear-gradient(145deg, #110d09 0%, #18120d 100%);
		}

	</style>

	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
