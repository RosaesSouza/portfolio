<!doctype html>
<html lang="pt-BR">

<head>
	<meta charset="utf-8" />

	<link rel="icon" href="%sveltekit.assets%/favicon.png" />
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
		rel="stylesheet">
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Rosæs</title>
	<meta name="description" content="" />
	<style>
		html {
			width: 100vw;
			height: 100vh;
			font-family: "Open Sans", sans-serif;
			overflow: hidden;
			box-sizing: border-box;
			transition: background-color 0.3s ease, color 0.3s ease;
		}

		:root {
			--primary-color: #13130c;
			--secondary-color: #fffce2;
			--dark-theme: #1d1f1f;
		}

		body.dark-mode {
			background-color: var(--dark-theme) !important;
		}

		body.dark-mode :root {
			--secondary-color: var(--dark-theme);
		}

		body.dark-mode .header,
		body.dark-mode .projeto-item,
		body.dark-mode footer {
			background-color: var(--primary-color) !important;
		}

		body.dark-mode nav button.active
		{
			background-color: var(--dark-theme) !important;
			color: var(--secondary-color) !important;
		}

		body.dark-mode .contatos-container h2,
		body.dark-mode .contatos-container h3,
		body.dark-mode .contatos-container p,
		body.dark-mode .contatos-container a,
		body.dark-mode .curriculo-container h2,
		body.dark-mode .curriculo-container h3,
		body.dark-mode .curriculo-container p,
		body.dark-mode .nota,
		body.dark-mode main {
			background-color: var(--dark-theme) !important;
			color: var(--secondary-color) !important;
		}

		button {
			font-family: "Open Sans", sans-serif;
		}

		body {
			margin: 0;
			padding: 0;
			line-height: 1.6;
			background-color: var(--secondary-color);
			overflow: hidden;
			height: 100vh;
			box-sizing: border-box;
		}
	</style>

	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
